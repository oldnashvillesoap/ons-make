<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Migrate Recipes — ONS Make</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #1e293b; font-size: 14px; padding: 40px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .sub { color: #64748b; margin-bottom: 32px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 24px; margin-bottom: 20px; max-width: 680px; }
    .card h2 { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
    button { padding: 9px 18px; border-radius: 6px; font-size: 13.5px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; }
    .btn-primary { background: #059669; color: #fff; }
    .btn-primary:hover { background: #047857; }
    .btn-primary:disabled { background: #a7f3d0; cursor: default; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-danger:disabled { background: #fca5a5; cursor: default; }
    .btn-ghost { background: transparent; border: 1px solid #e2e8f0; color: #64748b; margin-right: 8px; }
    .btn-ghost:hover { background: #f8fafc; }
    #log { margin-top: 16px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 14px; font-family: monospace; font-size: 12.5px; line-height: 1.7; max-height: 360px; overflow-y: auto; white-space: pre-wrap; }
    .ok   { color: #059669; }
    .warn { color: #d97706; }
    .err  { color: #ef4444; }
    .info { color: #3b82f6; }
    #auth-section { max-width: 680px; }
    #main-section { display: none; max-width: 680px; }
  </style>
</head>
<body>
  <h1>Migrate Recipes</h1>
  <p class="sub">Delete recipes whose name does <strong>not</strong> start with <strong>"Recipe,"</strong> · Strip <strong>"Recipe,"</strong> prefix from the rest</p>

  <div id="auth-section" class="card">
    <h2>Sign In</h2>
    <p style="color:#64748b;margin-bottom:16px;font-size:13px">Sign in with the same Google account you use for ONS Make.</p>
    <button class="btn-primary" id="btn-signin">Sign in with Google</button>
    <div id="auth-error" style="color:#ef4444;margin-top:12px;font-size:13px"></div>
  </div>

  <div id="main-section">
    <div class="card">
      <h2>Step 1 — Preview</h2>
      <p style="color:#64748b;font-size:13px;margin-bottom:14px">Fetch all recipes, show which will be deleted and which will be renamed.</p>
      <button class="btn-ghost" id="btn-preview">Preview recipes</button>
      <button class="btn-danger" id="btn-run" disabled>Run migration</button>
      <div id="log"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="js/config.js"></script>
  <script>
    const db   = firebase.firestore();
    const auth = firebase.auth();

    let _toDelete = [];
    let _toRename = [];

    function log(msg, cls = '') {
      const el = document.getElementById('log');
      const line = document.createElement('div');
      if (cls) line.className = cls;
      line.textContent = msg;
      el.appendChild(line);
      el.scrollTop = el.scrollHeight;
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }

    // ── Auth ──────────────────────────────────────────────────
    auth.onAuthStateChanged(async user => {
      if (user) {
        try {
          const entry = await db.collection('allowed_users').doc(user.uid).get();
          if (!entry.exists) {
            await auth.signOut();
            document.getElementById('auth-error').textContent = 'Access denied.';
            return;
          }
        } catch {
          await auth.signOut();
          document.getElementById('auth-error').textContent = 'Access check failed.';
          return;
        }
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('main-section').style.display = 'block';
      } else {
        document.getElementById('auth-section').style.display = '';
        document.getElementById('main-section').style.display = 'none';
      }
    });

    document.getElementById('btn-signin').addEventListener('click', async () => {
      try {
        await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
      } catch (e) {
        document.getElementById('auth-error').textContent = e.message;
      }
    });

    // ── Preview ───────────────────────────────────────────────
    document.getElementById('btn-preview').addEventListener('click', async () => {
      clearLog();
      _toDelete = [];
      _toRename = [];
      document.getElementById('btn-run').disabled = true;
      log('Fetching recipes…', 'info');

      try {
        const snap = await db.collection('recipes').get();
        const all  = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        log(`Total recipes: ${all.length}`);

        _toRename = all.filter(r =>  (r.name || '').startsWith('Recipe,'));
        _toDelete = all.filter(r => !(r.name || '').startsWith('Recipe,'));

        log(`\nWill be renamed (${_toRename.length}) — "Recipe," prefix stripped:`);
        _toRename.forEach(r => {
          const newName = r.name.slice('Recipe,'.length).trimStart();
          log(`  ✎ "${r.name}"  →  "${newName}"`, 'info');
        });

        if (_toDelete.length) {
          log(`\nWill be deleted (${_toDelete.length}):`);
          _toDelete.forEach(r => log(`  ✗ [${r.id}]  "${r.name || '(no name)'}"`, 'err'));
        } else {
          log('\nNo recipes to delete.', 'warn');
        }

        if (!_toRename.length && !_toDelete.length) {
          log('\nNothing to do.', 'warn');
          return;
        }

        document.getElementById('btn-run').disabled = false;
        log('\nReady. Click "Run migration" to apply.', 'info');
      } catch (e) {
        log(`Error: ${e.message}`, 'err');
      }
    });

    // ── Run ───────────────────────────────────────────────────
    document.getElementById('btn-run').addEventListener('click', async () => {
      if (!_toRename.length && !_toDelete.length) return;
      const summary = [
        _toRename.length ? `rename ${_toRename.length} recipe(s)` : '',
        _toDelete.length ? `permanently delete ${_toDelete.length} recipe(s)` : '',
      ].filter(Boolean).join(' and ');
      if (!confirm(`This will ${summary}. Deletions cannot be undone.`)) return;

      document.getElementById('btn-run').disabled     = true;
      document.getElementById('btn-preview').disabled = true;

      let ok = 0, fail = 0;

      if (_toRename.length) {
        log('\nRenaming…', 'info');
        for (const recipe of _toRename) {
          const newName = recipe.name.slice('Recipe,'.length).trimStart();
          try {
            await db.collection('recipes').doc(recipe.id).update({ name: newName });
            log(`  ✓ "${recipe.name}"  →  "${newName}"`, 'ok');
            ok++;
          } catch (e) {
            log(`  ✗ "${recipe.name}": ${e.message}`, 'err');
            fail++;
          }
        }
      }

      if (_toDelete.length) {
        log('\nDeleting…', 'info');
        for (const recipe of _toDelete) {
          try {
            await db.collection('recipes').doc(recipe.id).delete();
            log(`  ✓ Deleted "${recipe.name || recipe.id}"`, 'ok');
            ok++;
          } catch (e) {
            log(`  ✗ Failed "${recipe.name || recipe.id}": ${e.message}`, 'err');
            fail++;
          }
        }
      }

      log(`\nDone — ${ok} succeeded, ${fail} failed.`, ok && !fail ? 'ok' : 'warn');
      document.getElementById('btn-preview').disabled = false;
      _toRename = [];
      _toDelete = [];
    });
  </script>
</body>
</html>
